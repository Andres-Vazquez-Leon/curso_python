{% extends "base.html" %}
{% block title %}Libros web - Inicio{% endblock %}
{% block body %}
<div class="card" style="width: 18rem;">
  <img class="card-img-top" src="{{ book.image_url }}" alt="Card image cap">
  <div class="card-body">
    <h5 class="card-title">{{ book.title }}</h5>
    <p class="card-text">{{ book.author }}</p>
    <a href="/search_by_author" class="btn btn-primary">Search by Author</a>
  </div>
</div>
{% endblock %}
